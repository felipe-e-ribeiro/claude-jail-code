name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          push: true
          tags: |
            feliperibeiro95/claude-jail-code:${{ steps.version.outputs.tag }}
            feliperibeiro95/claude-jail-code:latest

  security-scan:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: feliperibeiro95/claude-jail-code:${{ needs.docker-build.outputs.tag }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  update-config:
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update versions.json
        run: |
          echo '{"image":"feliperibeiro95/claude-jail-code:${{ needs.docker-build.outputs.tag }}"}' > versions.json

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add versions.json
          git commit -m "chore: update versions.json to ${{ needs.docker-build.outputs.tag }}"
          git push origin main

  build-extension:
    needs: update-config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: extension

      - name: Compile TypeScript
        run: npm run compile
        working-directory: extension

      - name: Package extension
        run: npm run package
        working-directory: extension

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: extension/*.vsix

  create-release:
    needs: build-extension
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: extension

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: extension/*.vsix
          generate_release_notes: true
