name: CI

on:
  push:
    branches:
      - main
      - dev

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: extension

      - name: TypeScript compile check
        run: npm run compile
        working-directory: extension
